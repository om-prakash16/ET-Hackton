steps:
  # 1. Build Frontend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/frontend-app:$COMMIT_SHA', './frontend']
    id: 'build-frontend'

  # 2. Push Frontend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/frontend-app:$COMMIT_SHA']
    id: 'push-frontend'
    waitFor: ['build-frontend']

  # 3. Deploy Frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'frontend-app'
      - '--image'
      - 'gcr.io/$PROJECT_ID/frontend-app:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'
    id: 'deploy-frontend'
    waitFor: ['push-frontend']

  # 4. Build Backend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/backend-api:$COMMIT_SHA', './backend']
    id: 'build-backend'

  # 5. Push Backend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/backend-api:$COMMIT_SHA']
    id: 'push-backend'
    waitFor: ['build-backend']

  # 6. Deploy Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'backend-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/backend-api:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
      - '--port'
      - '8000'
      # Specify VPC connector or other database connection settings here if required
    id: 'deploy-backend'
    waitFor: ['push-backend']

images:
  - 'gcr.io/$PROJECT_ID/frontend-app:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/backend-api:$COMMIT_SHA'
